<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chemie Snake-Quiz | Edition St. Pölten</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { touch-action: none; }
        canvas { 
            background-color: #0f172a; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            image-rendering: pixelated;
        }
        .pixel-font { font-family: 'VT323', monospace; }
        .dpad-btn { 
            background: #1e293b; color: #94a3b8; border: 2px solid #334155; 
            border-radius: 0.75rem; width: 60px; height: 60px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 1.5rem; font-weight: bold; user-select: none;
        }
        .dpad-btn:active { background: #3b82f6; color: white; border-color: #60a5fa; }
        .slow-mo-indicator { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* Visueller Indikator für den Canvas im Lese-Modus */
        .canvas-slow-mo { border-color: #3b82f6 !important; box-shadow: 0 0 15px #3b82f6; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-800 min-h-screen text-slate-100 font-sans flex flex-col items-center py-6 px-4">

    <header class="w-full max-w-2xl bg-slate-900 p-6 rounded-3xl shadow-xl border-b-4 border-blue-600 mb-6 flex items-center gap-4">
        <div class="bg-blue-600 p-3 rounded-2xl text-white text-3xl">🐍</div>
        <div>
            <h1 class="text-3xl font-black text-white uppercase tracking-wider">Snake <span class="text-blue-400">Quiz</span></h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Wissen & Geschicklichkeit | St. Pölten</p>
        </div>
    </header>

    <div id="menuScreen" class="w-full max-w-2xl bg-slate-900 p-8 rounded-3xl shadow-xl border border-slate-700">
        <h2 class="text-2xl font-black text-blue-400 mb-6 uppercase">Spiel-Einstellungen</h2>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Grund-Geschwindigkeit</label>
                <div class="flex gap-2">
                    <button onclick="setSpeed(200, this)" class="speed-btn flex-1 py-3 rounded-xl bg-blue-600 text-white font-black border-2 border-blue-400">Schüler</button>
                    <button onclick="setSpeed(130, this)" class="speed-btn flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-black border-2 border-slate-700">Student</button>
                    <button onclick="setSpeed(80, this)" class="speed-btn flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-black border-2 border-slate-700">Meister</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Lese-Pause (Halbe Geschwindigkeit): <span id="slowMoDisplay" class="text-blue-400">2 Sek</span></label>
                <input type="range" id="slowMoInput" min="0" max="5" value="2" step="1" oninput="document.getElementById('slowMoDisplay').innerText = this.value + ' Sek'" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                <p class="text-xs text-slate-500 mt-1">Gibt Zeit, die Frage in Ruhe zu lesen und die Antwort zu lokalisieren.</p>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Fragenanzahl (<span id="qCountDisplay">10</span>)</label>
                <input type="range" id="qCountInput" min="5" max="30" value="10" step="5" oninput="document.getElementById('qCountDisplay').innerText = this.value" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>

            <button onclick="startGame()" class="w-full bg-green-600 hover:bg-green-500 text-white py-5 rounded-2xl font-black text-xl uppercase tracking-widest shadow-lg mt-4 transition-colors">
                Spiel Starten
            </button>
        </div>
    </div>

    <div id="gameScreen" class="hidden w-full max-w-2xl flex flex-col items-center">
        
        <div class="w-full flex justify-between items-center bg-slate-900 p-4 rounded-t-2xl border border-slate-700 border-b-0">
            <div class="font-black text-blue-400 uppercase tracking-widest">Frage <span id="uiQuestionNum">1</span>/<span id="uiQuestionTotal">10</span></div>
            <div class="font-black flex items-center gap-4">
                <span id="slowMoIndicator" class="hidden text-xs bg-blue-600 text-white px-2 py-1 rounded slow-mo-indicator uppercase tracking-widest">Lesezeit</span>
                <span class="text-green-400 uppercase tracking-widest">Punkte: <span id="uiScore" class="pixel-font text-2xl">0</span></span>
            </div>
        </div>

        <div class="w-full bg-blue-900 p-6 border-x border-slate-700 text-center min-h-[100px] flex items-center justify-center">
            <p id="questionText" class="text-xl md:text-2xl font-bold text-white shadow-sm"></p>
        </div>
        
        <div class="w-full flex justify-center gap-8 bg-slate-900 p-2 border-x border-slate-700 text-xs font-bold uppercase tracking-widest">
            <span class="text-green-400 flex items-center gap-2"><div class="w-3 h-3 bg-green-500 rounded-sm"></div> = JA (Wahr)</span>
            <span class="text-red-400 flex items-center gap-2"><div class="w-3 h-3 bg-red-500 rounded-sm"></div> = NEIN (Falsch)</span>
        </div>

        <canvas id="gameCanvas" width="400" height="400" class="w-full max-w-[400px] border-4 border-slate-700 transition-colors"></canvas>

        <div class="w-full max-w-[400px] flex justify-between gap-4 mt-4">
            <button id="pauseBtn" onclick="togglePause()" class="flex-1 bg-yellow-600 hover:bg-yellow-500 text-white py-3 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg transition-colors">
                ⏸ Pause
            </button>
            <button onclick="backToMenu()" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white py-3 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg transition-colors">
                ⏹ Menü
            </button>
        </div>

        <div class="mt-4 grid grid-cols-3 gap-2 md:hidden">
            <div></div>
            <button class="dpad-btn" ontouchstart="changeDir(0, -1); event.preventDefault();" onmousedown="changeDir(0, -1)">▲</button>
            <div></div>
            <button class="dpad-btn" ontouchstart="changeDir(-1, 0); event.preventDefault();" onmousedown="changeDir(-1, 0)">◀</button>
            <button class="dpad-btn" ontouchstart="changeDir(0, 1); event.preventDefault();" onmousedown="changeDir(0, 1)">▼</button>
            <button class="dpad-btn" ontouchstart="changeDir(1, 0); event.preventDefault();" onmousedown="changeDir(1, 0)">▶</button>
        </div>
    </div>

    <div id="gameOverScreen" class="hidden w-full max-w-2xl bg-slate-900 p-10 rounded-3xl shadow-2xl border-t-8 border-blue-600 text-center mt-6">
        <h2 class="text-4xl font-black text-white mb-2 uppercase" id="goTitle">Spiel Beendet</h2>
        <p class="text-slate-400 mb-8 font-bold tracking-widest uppercase">Deine Leistung</p>
        
        <div class="text-7xl pixel-font text-yellow-400 mb-8" id="goScore">0</div>
        
        <div class="bg-slate-800 p-4 rounded-xl mb-8 text-left max-h-48 overflow-y-auto border border-slate-700 text-sm" id="goDetails"></div>

        <button onclick="backToMenu()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500">
            Zurück zum Menü
        </button>
    </div>

    <script>
        // --- FALLBACK DATABASE ---
        const fallbackQuestions = [
            { "q": "Ist Wasserstoff das leichteste chemische Element?", "a": true },
            { "q": "Besteht Kochsalz (NaCl) aus Kohlenstoff und Chlor?", "a": false },
            { "q": "Ist der pH-Wert einer reinen Säure kleiner als 7?", "a": true },
            { "q": "Ist das chemische Symbol für Gold 'Ag'?", "a": false },
            { "q": "Ist bei einer Oxidation eine Elektronenabgabe im Spiel?", "a": true },
            { "q": "Zählt Methan (CH4) zur organischen Chemie?", "a": true },
            { "q": "Entsteht bei einer Neutralisation immer ein Gas?", "a": false },
            { "q": "Hat ein Mol Wasser eine Masse von ca. 18 Gramm?", "a": true }
        ];

        // --- GAME VARIABLES ---
        let questions = [];
        let activeQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let errors = []; 

        let baseSpeed = 200; 
        let gameLoop;
        let slowMoTimeout;
        let isPaused = false; // Pause Flag

        // Snake Logik
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let dx = 0; let dy = 0;
        let nextDx = 0; let nextDy = 0;
        
        let foodJa = {x: 0, y: 0};
        let foodNein = {x: 0, y: 0};

        // --- INIT ---
        window.onload = async () => {
            try {
                const response = await fetch('fragen.json');
                if(response.ok) {
                    questions = await response.json();
                } else { throw new Error("JSON nicht gefunden"); }
            } catch (e) {
                console.log("Nutze Fallback-Fragen:", e.message);
                questions = fallbackQuestions;
            }
        };

        // --- MENU UI ---
        function setSpeed(ms, btn) {
            baseSpeed = ms;
            document.querySelectorAll('.speed-btn').forEach(b => {
                b.className = "speed-btn flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-black border-2 border-slate-700";
            });
            btn.className = "speed-btn flex-1 py-3 rounded-xl bg-blue-600 text-white font-black border-2 border-blue-400";
        }

        function startGame() {
            let qCount = parseInt(document.getElementById('qCountInput').value);
            let shuffled = [...questions].sort(() => 0.5 - Math.random());
            activeQuestions = shuffled.slice(0, Math.min(qCount, questions.length));
            
            currentQuestionIndex = 0;
            score = 0;
            errors = [];
            isPaused = false;
            document.getElementById('pauseBtn').innerText = "⏸ Pause";
            document.getElementById('pauseBtn').className = "flex-1 bg-yellow-600 hover:bg-yellow-500 text-white py-3 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg transition-colors";
            
            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('uiQuestionTotal').innerText = activeQuestions.length;
            
            resetSnake();
            spawnFood();
            updateUI();
            
            triggerSlowMo(); 
        }

        // --- GAME CONTROLS ---
        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pauseBtn');
            
            if (isPaused) {
                btn.innerText = "▶ Weiter";
                btn.className = "flex-1 bg-green-600 hover:bg-green-500 text-white py-3 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg transition-colors";
                
                // Pause-Overlay zeichnen
                ctx.fillStyle = "rgba(15, 23, 42, 0.75)"; // abgedunkeltes slate-900
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#facc15"; // yellow-400
                ctx.font = "bold 30px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("PAUSIERT", canvas.width / 2, canvas.height / 2 + 10);
            } else {
                btn.innerText = "⏸ Pause";
                btn.className = "flex-1 bg-yellow-600 hover:bg-yellow-500 text-white py-3 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg transition-colors";
                // Der nächste Durchlauf von updateGame() zeichnet das Spielfeld neu
            }
        }

        function backToMenu() {
            clearInterval(gameLoop);
            clearTimeout(slowMoTimeout);
            isPaused = false;
            document.getElementById('slowMoIndicator').classList.add('hidden');
            document.getElementById('gameCanvas').classList.remove('canvas-slow-mo');
            
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('menuScreen').classList.remove('hidden');
        }

        // --- SLOW MOTION LOGIC ---
        function triggerSlowMo() {
            let slowMoSeconds = parseInt(document.getElementById('slowMoInput').value);
            
            clearInterval(gameLoop); 
            
            if (slowMoSeconds > 0) {
                document.getElementById('slowMoIndicator').classList.remove('hidden');
                document.getElementById('gameCanvas').classList.add('canvas-slow-mo'); // Blauer Rahmen
                
                gameLoop = setInterval(updateGame, baseSpeed * 2);
                
                if (slowMoTimeout) clearTimeout(slowMoTimeout);
                
                slowMoTimeout = setTimeout(() => {
                    document.getElementById('slowMoIndicator').classList.add('hidden');
                    document.getElementById('gameCanvas').classList.remove('canvas-slow-mo');
                    clearInterval(gameLoop);
                    gameLoop = setInterval(updateGame, baseSpeed);
                }, slowMoSeconds * 1000);
            } else {
                gameLoop = setInterval(updateGame, baseSpeed);
            }
        }

        // --- SNAKE LOGIC ---
        function resetSnake() {
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            dx = 0; dy = -1; nextDx = 0; nextDy = -1;
        }

        function spawnFood() {
            foodJa = getRandomPos();
            do { foodNein = getRandomPos(); } while (foodNein.x === foodJa.x && foodNein.y === foodJa.y);
        }

        function getRandomPos() {
            let pos;
            while(true) {
                pos = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
                let onSnake = snake.some(segment => segment.x === pos.x && segment.y === pos.y);
                if(!onSnake) return pos;
            }
        }

        function changeDir(newDx, newDy) {
            if (isPaused) return; // Keine Eingaben während Pause
            if (newDx === -dx && newDx !== 0) return;
            if (newDy === -dy && newDy !== 0) return;
            nextDx = newDx; nextDy = newDy;
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { changeDir(0, -1); e.preventDefault(); }
            if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { changeDir(0, 1); e.preventDefault(); }
            if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { changeDir(-1, 0); }
            if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { changeDir(1, 0); }
            if(e.key === ' ' || e.key === 'Escape' || e.key === 'p') { togglePause(); e.preventDefault(); } // Leertaste = Pause
        });

        // --- MAIN GAME LOOP ---
        function updateGame() {
            if (isPaused) return; // Pausen-Sperre

            dx = nextDx; dy = nextDy;
            let head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall Collision
            if (head.x < 0) head.x = tileCount - 1;
            if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1;
            if (head.y >= tileCount) head.y = 0;

            // Self Collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame("Crash! Du hast dich selbst gebissen."); return;
                }
            }

            snake.unshift(head);

            let ateJa = (head.x === foodJa.x && head.y === foodJa.y);
            let ateNein = (head.x === foodNein.x && head.y === foodNein.y);

            if (ateJa || ateNein) {
                checkAnswer(ateJa);
            } else {
                snake.pop();
            }

            // Wenn Spiel durch checkAnswer beendet wurde, nicht mehr zeichnen
            if (!document.getElementById('gameScreen').classList.contains('hidden')) {
                drawGame();
            }
        }

        function checkAnswer(choseYes) {
            let currentQ = activeQuestions[currentQuestionIndex];
            let isCorrect = (choseYes === currentQ.a);

            if (isCorrect) {
                score += 10;
            } else {
                errors.push(currentQ);
                score = Math.max(0, score - 5);
                snake.pop(); snake.pop(); 
                if(snake.length < 2) { endGame("Deine Schlange ist verhungert!"); return; }
            }

            currentQuestionIndex++;
            
            if (currentQuestionIndex >= activeQuestions.length) {
                endGame("Quiz abgeschlossen!");
            } else {
                spawnFood();
                updateUI();
                triggerSlowMo(); 
            }
        }

        function updateUI() {
            if(currentQuestionIndex < activeQuestions.length) {
                document.getElementById('questionText').innerText = activeQuestions[currentQuestionIndex].q;
                document.getElementById('uiQuestionNum').innerText = currentQuestionIndex + 1;
                document.getElementById('uiScore').innerText = score;
            }
        }

        // --- RENDER ---
        function drawGame() {
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Sanftes Raster
            ctx.strokeStyle = '#1e293b';
            for(let i=0; i<=tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*gridSize); ctx.lineTo(canvas.width, i*gridSize); ctx.stroke();
            }

            // Food JA
            ctx.fillStyle = '#22c55e'; ctx.shadowBlur = 10; ctx.shadowColor = '#22c55e';
            ctx.fillRect(foodJa.x * gridSize + 2, foodJa.y * gridSize + 2, gridSize - 4, gridSize - 4);
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 0; ctx.font = "12px sans-serif"; ctx.textAlign = "left";
            ctx.fillText("J", foodJa.x * gridSize + 6, foodJa.y * gridSize + 14);

            // Food NEIN
            ctx.fillStyle = '#ef4444'; ctx.shadowBlur = 10; ctx.shadowColor = '#ef4444';
            ctx.fillRect(foodNein.x * gridSize + 2, foodNein.y * gridSize + 2, gridSize - 4, gridSize - 4);
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
            ctx.fillText("N", foodNein.x * gridSize + 6, foodNein.y * gridSize + 14);

            // Snake
            ctx.shadowBlur = 0;
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#60a5fa' : '#3b82f6'; 
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        // --- END GAME ---
        function endGame(msg) {
            clearInterval(gameLoop);
            clearTimeout(slowMoTimeout);
            isPaused = false;
            document.getElementById('slowMoIndicator').classList.add('hidden');
            document.getElementById('gameCanvas').classList.remove('canvas-slow-mo');
            
            document.getElementById('gameScreen').classList.add('hidden');
            const goScreen = document.getElementById('gameOverScreen');
            goScreen.classList.remove('hidden');
            
            document.getElementById('goTitle').innerText = msg;
            document.getElementById('goScore').innerText = score;

            let detailsHTML = "";
            if(errors.length > 0) {
                detailsHTML += "<p class='font-bold text-red-400 mb-2 uppercase'>Fehler-Analyse:</p><ul class='list-disc pl-5 text-slate-300 space-y-2'>";
                errors.forEach(err => { detailsHTML += `<li>${err.q} <br><span class='text-blue-400'>Richtige Antwort: ${err.a ? "JA" : "NEIN"}</span></li>`; });
                detailsHTML += "</ul>";
            } else {
                detailsHTML = "<p class='text-green-400 font-bold'>Perfekt! Keine Fehler gemacht.</p>";
            }
            document.getElementById('goDetails').innerHTML = detailsHTML;
        }
    </script>
</body>
</html>
